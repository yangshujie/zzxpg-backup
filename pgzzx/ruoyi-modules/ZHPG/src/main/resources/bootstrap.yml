# Tomcat
server:
  port: 9303

# Spring
spring:
  application:
    name: zhpg
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
        shared-configs:
          - application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}

# ZHPG
zhpg:
  huage:
    base-url: http://172.16.2.89:9501
    lineage-path: /lineage/node/with-edge
    lineage-interval-ms: 200
    connect-timeout-ms: 3000
    read-timeout-ms: 5000
